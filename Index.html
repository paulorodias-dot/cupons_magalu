<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cupons Express Magalu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0086ff; --green: #28a745; --yellow: #ffc107; --bg: #f7f9fc; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 120px; color: var(--text); }
        header { background: var(--blue); color: white; padding: 20px; text-align: center; font-weight: bold; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 15px; max-width: 500px; margin: auto; min-height: 70vh; }
        
        .search-container { position: relative; display: flex; align-items: center; background: white; border-radius: 12px; border: 1px solid #ddd; padding: 0 15px; margin-bottom: 15px; }
        .search-container input { border: none; outline: none; width: 100%; padding: 15px 0; font-size: 16px; margin-left: 10px; }
        .clear-btn { color: #ccc; cursor: pointer; padding: 10px; display: none; }

        .card { background: white; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-header h3 { margin: 0; font-size: 14px; color: #444; flex: 1; padding-right: 10px; }
        .card-header i { color: var(--blue); transition: 0.3s; }
        
        .card-content { max-height: 0; padding: 0 15px; background: #fcfcfc; transition: max-height 0.4s ease-in-out; overflow: hidden; }
        .card.open .card-content { max-height: 2000px; padding: 15px; border-top: 1px solid #eee; }
        .card.open .card-header i { transform: rotate(180deg); }

        .coupon-item { background: white; border: 1px solid #eee; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .coupon-type { font-size: 11px; font-weight: bold; color: var(--blue); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .cupom-box { background: #eef6ff; border: 2px dashed var(--blue); padding: 10px; border-radius: 8px; text-align: center; margin: 8px 0; }
        .cupom-code { font-size: 18px; font-weight: bold; color: var(--blue); letter-spacing: 1px; }

        .btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-copy { background: var(--green); margin-top: 5px; padding: 10px; font-size: 13px; transition: all 0.3s ease; }
        
        /* Ajuste da cor amarela ao copiar */
        .btn-copy.copied { background: var(--yellow) !important; color: #000 !important; border: 1px solid #e0a800; }

        .input-group input, .input-group textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 8px; box-sizing: border-box; }
        .section { display: none; }
        .active { display: block; }
        
        /* Rodapé de Direitos */
        .footer-rights { text-align: center; font-size: 10px; color: #aaa; padding: 20px 0; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }

        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; height: 70px; z-index: 100; }
        .nav-tab { flex: 1; text-align: center; padding: 12px 0; color: #888; cursor: pointer; font-size: 11px; }
        .nav-tab.on { color: var(--blue); font-weight: bold; }
        .nav-tab i { font-size: 20px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

<header>Cupons Express Magalu</header>

<div class="container">
    <div id="tab-list" class="section active">
        <div class="search-container">
            <i class="fas fa-search" style="color:var(--blue)"></i>
            <input type="text" id="findInput" placeholder="Buscar modelo..." onkeyup="handleSearch(event)">
            <i class="fas fa-times-circle clear-btn" id="clearSearch" onclick="clearInput()"></i>
        </div>
        <div id="results"></div>
        <div class="footer-rights">© 2026 Cupons Express Magalu - Todos os direitos reservados</div>
    </div>

    <div id="tab-import" class="section">
        <div class="card" style="border-left-width: 6px;">
            <div style="padding:15px">
                <h3><i class="fas fa-file-import"></i> Importar Lote TXT</h3>
                <div class="input-group">
                    <textarea id="txt_input" rows="8" placeholder="Modelo | Validade | Desconto | Cupom"></textarea>
                </div>
                <button class="btn" onclick="processarTxt()"><i class="fas fa-magic"></i> Validar Lote</button>
            </div>
        </div>
        <div class="footer-rights">© 2026 Cupons Express Magalu - Todos os direitos reservados</div>
    </div>

    <div id="tab-form" class="section">
        <div class="card" style="border-left-color: var(--green); border-left-width: 6px;">
            <div style="padding:15px">
                <h3><i class="fas fa-check-double"></i> Confirmar Envio</h3>
                <div class="input-group">
                    <input type="text" id="f_mod" readonly style="background: #f9f9f9;">
                    <input type="text" id="f_cup" readonly style="background: #f9f9f9;">
                    <div id="pass_area">
                        <input type="password" id="f_pass" placeholder="Senha Administrativa">
                    </div>
                </div>
                <button class="btn" id="btn-save" onclick="sendToSheet()" style="background:var(--green)">
                    <i class="fas fa-cloud-upload-alt"></i> GRAVAR NO BANCO
                </button>
                <p id="progress-text" style="text-align:center; font-size:12px; margin-top:10px; color:#666;"></p>
            </div>
        </div>
        <div class="footer-rights">© 2026 Cupons Express Magalu - Todos os direitos reservados</div>
    </div>
</div>

<nav>
    <div class="nav-tab on" onclick="switchTab('tab-list', this)"><i class="fas fa-search"></i>Busca</div>
    <div class="nav-tab" onclick="switchTab('tab-import', this)"><i class="fas fa-paste"></i>Importar</div>
    <div class="nav-tab" onclick="switchTab('tab-form', this)"><i class="fas fa-save"></i>Gravar</div>
</nav>

<script>
    const CONFIG = {
        URL: "https://script.google.com/macros/s/AKfycbwOVMeJAVYVuYrmdJOx0ZZKImMEgoqdMqc9mjgibl3AO11KTRJFdZGJOrVXjDK-xAyc4g/exec",
        PASS: "1234"
    };

    let localDb = [];
    let authenticated = false;

    function switchTab(id, el) {
        document.querySelectorAll('.section, .nav-tab').forEach(x => x.classList.remove('active', 'on'));
        document.getElementById(id).classList.add('active');
        el.classList.add('on');
        if(id === 'tab-list') { fetchSheet(); clearInput(); }
    }

    function handleSearch(e) {
        const input = document.getElementById('findInput');
        document.getElementById('clearSearch').style.display = input.value ? "block" : "none";
        if (e.key === "Enter") input.blur();
        doSearch();
    }

    function clearInput() {
        document.getElementById('findInput').value = "";
        document.getElementById('clearSearch').style.display = "none";
        document.getElementById('results').innerHTML = "";
    }

    function toggleCard(el) {
        el.parentElement.classList.toggle('open');
    }

    async function sendToSheet() {
        if(!authenticated) {
            if(document.getElementById('f_pass').value !== CONFIG.PASS) return alert("Senha Incorreta");
            authenticated = true;
            document.getElementById('pass_area').style.display = "none";
        }
        const text = document.getElementById('txt_input').value.trim();
        const lines = text.split('\n');
        const btn = document.getElementById('btn-save');
        const progress = document.getElementById('progress-text');
        
        btn.disabled = true;
        for (let i = 0; i < lines.length; i++) {
            const parts = lines[i].split(/\t|\|/);
            if (parts.length < 2) continue;
            progress.innerText = `Enviando: ${i + 1}/${lines.length}`;
            const params = new URLSearchParams({
                modelo: parts[0].trim(),
                validade: parts.length > 2 ? parts[1].trim() : "08/03/2026",
                desconto: parts.length > 3 ? parts[2].trim() : "R$ 0",
                cupom: (parts[parts.length - 1] || "").trim().toUpperCase(),
                observacao: parts[0].toLowerCase().includes("portin") ? "Portabilidade" : "Nova Linha"
            });
            try { await fetch(`${CONFIG.URL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' }); } catch (e) {}
        }
        alert("Concluído!");
        document.getElementById('txt_input').value = "";
        document.getElementById('f_mod').value = "";
        document.getElementById('f_cup').value = "";
        progress.innerText = "";
        btn.disabled = false;
        switchTab('tab-list', document.querySelectorAll('.nav-tab')[0]);
    }

    async function fetchSheet() {
        try {
            const res = await fetch(CONFIG.URL);
            localDb = await res.json();
        } catch (e) {}
    }

    function render(data) {
        const term = document.getElementById('findInput').value;
        if(!term) { document.getElementById('results').innerHTML = ""; return; }

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const primaryGroup = data.reduce((acc, item) => {
            const key = `${item.modelo.trim().toLowerCase()}|${item.cupom.trim().toUpperCase()}|${item.desconto.toString().trim()}`;
            if (!acc[key]) acc[key] = [];
            acc[key].push(item);
            return acc;
        }, {});

        const uniqueEntries = Object.values(primaryGroup).map(list => {
            const sorted = list.sort((a, b) => new Date(a.validade) - new Date(b.validade));
            return sorted.find(item => new Date(item.validade) >= today) || null;
        }).filter(item => item !== null);

        const finalGroup = uniqueEntries.reduce((acc, item) => {
            const key = item.modelo.trim();
            if (!acc[key]) acc[key] = [];
            acc[key].push(item);
            return acc;
        }, {});

        document.getElementById('results').innerHTML = Object.keys(finalGroup).map(modelo => {
            const items = finalGroup[modelo];
            return `
                <div class="card">
                    <div class="card-header" onclick="toggleCard(this)">
                        <h3>${modelo}</h3>
                        <span style="font-size:10px; background:#eef6ff; color:#0086ff; padding:2px 6px; border-radius:4px;">
                            ${items.length} ${items.length > 1 ? 'Tipos' : 'Cupom'}
                        </span>
                        <i class="fas fa-chevron-down" style="margin-left:10px"></i>
                    </div>
                    <div class="card-content">
                        ${items.map(item => {
                            const dt = new Date(item.validade);
                            const displayDate = !isNaN(dt) ? `${dt.getDate().toString().padStart(2, '0')}/${(dt.getMonth()+1).toString().padStart(2, '0')}/${dt.getFullYear()}` : item.validade;
                            const isPortin = item.cupom.toLowerCase().includes("portin") || (item.observacao || "").toLowerCase().includes("portin");

                            return `
                                <div class="coupon-item">
                                    <span class="coupon-type" style="color: ${isPortin ? '#e67e22' : '#0086ff'}">
                                        <i class="fas ${isPortin ? 'fa-sync-alt' : 'fa-plus-circle'}"></i> 
                                        ${isPortin ? 'Portabilidade' : 'Nova Linha / Controle'}
                                    </span>
                                    <div class="cupom-box">
                                        <span class="cupom-code">${item.cupom}</span>
                                    </div>
                                    <button class="btn btn-copy" onclick="copy(this, '${item.cupom}')">
                                        <i class="fas fa-copy"></i> COPIAR
                                    </button>
                                    <div style="display:flex; justify-content:space-between; font-size:10px; color:#999; margin-top:8px;">
                                        <span>Desc: ${item.desconto}</span>
                                        <span style="color:#d35400; font-weight:bold;">Expira: ${displayDate}</span>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function copy(btn, txt) {
        navigator.clipboard.writeText(txt);
        const originalContent = btn.innerHTML;
        btn.classList.add('copied');
        btn.innerHTML = `<i class="fas fa-check"></i> CUPOM COPIADO`;
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = originalContent;
        }, 2000);
    }

    function doSearch() {
        const term = document.getElementById('findInput').value.toLowerCase();
        render(localDb.filter(x => (x.modelo || "").toLowerCase().includes(term)));
    }

    function processarTxt() {
        const text = document.getElementById('txt_input').value.trim();
        if(!text) return alert("Cole os dados.");
        const lines = text.split('\n');
        const parts = lines[0].split(/\t|\|/);
        if(parts.length >= 2) {
            document.getElementById('f_mod').value = parts[0].trim();
            document.getElementById('f_cup').value = (parts[parts.length - 1] || "").trim().toUpperCase();
            switchTab('tab-form', document.querySelectorAll('.nav-tab')[2]);
        }
    }

    window.onload = fetchSheet;
</script>
</body>
</html>
